name: CI/CD Pipeline to Server

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v3

      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Phát hành (Build & Push) Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/tamtin-accounting-web:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tamtin-accounting-web:latest

      - name: Phát hành (Build & Push) Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/tamtin-accounting-api:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tamtin-accounting-api:latest

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Truy cập Server để tiến hành tải ảnh mới (Pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            echo "🔥 Bắt đầu cập nhật ứng dụng TamTin Kế Toán..."
            cd /root/tamtin-accounting

            # Tải images mới từ Docker Hub (chỉ backend và frontend)
            docker pull trolevan26299/tamtin-accounting-api:latest
            docker pull trolevan26299/tamtin-accounting-web:latest

            # Đảm bảo MongoDB đang chạy (không recreate để tránh lỗi)
            docker compose up -d mongodb_accounting

            # Recreate backend và frontend với image mới
            docker rm -f tamtin_accounting_backend tamtin_accounting_frontend || true
            docker compose up -d backend frontend

            # Dọn dẹp image cũ
            docker image prune -f
            echo "✅ Cập nhật hoàn tất!"
