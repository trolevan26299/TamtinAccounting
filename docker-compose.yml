version: '3.8'

services:
  mongodb_accounting:
    image: mongo:7.0
    container_name: tamtin_accounting_db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-AdminPassword123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-tamtin_accounting}
    ports:
      - "27019:27017" # Tránh đụng độ với port 27018 cũ của hệ thống
    volumes:
      - mongodb_accounting_data:/data/db
    networks:
      - tamtin_accounting_network

  backend:
    image: ${DOCKERHUB_USERNAME:-trolevan26299}/tamtin-accounting-api:latest
    container_name: tamtin_accounting_backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASS_ENCODED:-AdminPassword123}@tamtin_accounting_db:27017/${MONGO_DB:-tamtin_accounting}?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-default_jwt_secret_change_me}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-AdminPassword123}
    ports:
      - "3001:3001"
    depends_on:
      - mongodb_accounting
    networks:
      - tamtin_accounting_network

  frontend:
    image: ${DOCKERHUB_USERNAME:-trolevan26299}/tamtin-accounting-web:latest
    container_name: tamtin_accounting_frontend
    restart: unless-stopped
    ports:
      - "3000:80" # Chạy public ở cổng 3000 (map vào 80 nginx) hoặc có thể mở "80:80"
    depends_on:
      - backend
    networks:
      - tamtin_accounting_network

volumes:
  mongodb_accounting_data:
    name: tamtin_accounting_mongodb_data

networks:
  tamtin_accounting_network:
    name: tamtin_accounting_network
    driver: bridge
